<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href='./css/global.css'>
    <link rel="stylesheet" href="./css/loginpage.css">
    <script defer src="./js/loginpage.js"></script>
</head>
<body>
    <main>
        <figure>
            <img src="../assets/ForegroundP.webp" alt="img">
        </figure>
        
        <section id="wrapper">
            <form id="loginForm">
                <label>Sign In</label>

                <div class="username inputField">
                    <svg class="leftSvg" xmlns="http://www.w3.org/2000/svg" width="35" height="38" fill="none"><path fill="#212427" d="M17.476 6.282c1.545 0 3.026.662 4.119 1.84C22.687 9.3 23.3 10.898 23.3 12.564c0 1.667-.614 3.264-1.706 4.443-1.093 1.178-2.574 1.84-4.12 1.84-1.544 0-3.026-.662-4.118-1.84-1.093-1.179-1.707-2.776-1.707-4.443 0-1.666.614-3.264 1.707-4.442 1.092-1.178 2.574-1.84 4.119-1.84Zm0 15.706c6.437 0 11.65 2.811 11.65 6.282v3.141h-23.3V28.27c0-3.471 5.213-6.282 11.65-6.282Z"/></svg>
                    <input class="formInput" id="username"  required placeholder="Enter Username">
                </div>
                <p class="errMssgP" id="userErrMssgP"></p>
                

                <div class="email inputField">
                    <svg class="leftSvg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"><path fill="#292D32" d="M20 6.75a2.75 2.75 0 1 0 0-5.5 2.75 2.75 0 0 0 0 5.5Z"/><path fill="#292D32" d="M19.04 8.15a4.226 4.226 0 0 1-3.19-3.19c-.13-.61-.14-1.2-.03-1.76a.988.988 0 0 0-.97-1.2H7C4.24 2 2 4.24 2 7v6.95c0 2.76 2.24 5 5 5h1.5c.28 0 .64.18.8.4l1.5 1.99c.66.88 1.74.88 2.4 0l1.5-1.99a1 1 0 0 1 .8-.4h1.51c2.76 0 4.99-2.23 4.99-4.99V9.15c0-.63-.58-1.09-1.2-.97-.56.1-1.15.1-1.76-.03ZM8 12c-.56 0-1-.45-1-1s.44-1 1-1c.55 0 1 .45 1 1s-.44 1-1 1Zm4 0c-.56 0-1-.45-1-1s.44-1 1-1c.55 0 1 .45 1 1s-.44 1-1 1Zm4 0c-.56 0-1-.45-1-1s.44-1 1-1c.55 0 1 .45 1 1s-.44 1-1 1Z"/></svg>
                    <input class="formInput" id="emailInput" type="email"  required placeholder="Enter Email">
                </div>
                <p class="errMssgP" id="mailErrMssgP"></p>

                <div class="phoneNo inputField">
                    <svg class="leftSvg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"><path fill="#292D32" d="M11.05 14.95 9.2 16.8c-.39.39-1.01.39-1.41.01-.11-.11-.22-.21-.33-.32a28.414 28.414 0 0 1-2.79-3.27c-.82-1.14-1.48-2.28-1.96-3.41C2.24 8.67 2 7.58 2 6.54c0-.68.12-1.33.36-1.93.24-.61.62-1.17 1.15-1.67C4.15 2.31 4.85 2 5.59 2c.28 0 .56.06.81.18.26.12.49.3.67.56l2.32 3.27c.18.25.31.48.4.7.09.21.14.42.14.61 0 .24-.07.48-.21.71-.13.23-.32.47-.56.71l-.76.79c-.11.11-.16.24-.16.4 0 .08.01.15.03.23.03.08.06.14.08.2.18.33.49.76.93 1.28.45.52.93 1.05 1.45 1.58.1.1.21.2.31.3.4.39.41 1.03.01 1.43ZM21.97 18.33a2.54 2.54 0 0 1-.25 1.09c-.17.36-.39.7-.68 1.02-.49.54-1.03.93-1.64 1.18-.01 0-.02.01-.03.01-.59.24-1.23.37-1.92.37-1.02 0-2.11-.24-3.26-.73s-2.3-1.15-3.44-1.98c-.39-.29-.78-.58-1.15-.89l3.27-3.27c.28.21.53.37.74.48.05.02.11.05.18.08.08.03.16.04.25.04.17 0 .3-.06.41-.17l.76-.75c.25-.25.49-.44.72-.56.23-.14.46-.21.71-.21.19 0 .39.04.61.13.22.09.45.22.7.39l3.31 2.35c.26.18.44.39.55.64.1.25.16.5.16.78Z"/></svg>
                    <input class="formInput" id="phoneNo" required placeholder="Enter phone number">
                </div>
                <p class="errMssgP" id="numErrMssgP"></p>

                <div class="password inputField">
                    <img class="leftSvg" src="/assets/lockedPassword.svg" />
                    <input class="formInput" id="passwordInput" type="password" placeholder="Enter Password">
                    <button id="seePassword">
                        <img id="seePasswordIcon" src="/assets/lockedPassword.svg" />
                    </button>
                </div>
                <div class="errMssgP" id="passErrMssgP" ></div>

                <button class="button" id="loginB">Submit</button>
            </form>

            <div id="image">
                <img alt="img" src="../assets/ach3 1 (1).webp">
            </div>
        </section>
    </main> 

     <div id="successWrapper" >
        <div id="successWrapper2">
            <img src="/assets/greenTick.svg" />
            <h1 id="successMssg">Login details Valid!</h1>
        </div>
    </div>

</body>
</html>
